<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Form</title>
    <link rel="stylesheet" href="./reset.css">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    
<div class="container">
    <div class="title">EVENT REGISTRATION FORM</div>
    <div class="form-box">
        <form>

 <div class="wrapper">
<div class="row">
    <label>Name</label>
</div>
<div class="column">
    <div class="field">
    <input type="text" style="width: 100px;"> <span>First Name</span></div>
   <div class="field"><input type="text" style="width: 100px;"><span>Last Name</span></div> 
</div>      
</div>

<div class="wrapper">
<div class="row">
    <label>Company</label>
</div>
<div class="column">
    <input type="text">
</div>      
</div>

<div class="wrapper">
<div class="row">
    <label>Email</label></div>

<div class="column">
    <input type="email" placeholder="example@email.com">
</div> 
</div>

<div class="wrapper">
<div class="row">
    <label>Phone</label>
</div>
<div class="column">
   <div class="field"> <input type="tel" style="width: 45px;"><span>Area Code</span></div>
    <div class="field"> <input type="tel"><span>Phone Number</span></div>
</div>   
</div>

<div class="wrapper">
<div class="row">
    <label>Subject</label>
</div>
<div class="column">
   <select> <option>Choose Option</option></select>
</div> 
</div>

<div class="row">
    <p>Are you an existing customer?</p>
<div>

<div class="wrapper">
<div class="row">
<input type="radio" name="customer"  class="radio">Yes
<input type="radio" name="customer" class="radio">No
</div>
</div>

<div class="button">
<button>REGISTER</button>
</div>

        </form>
  

    </div>


</div>
